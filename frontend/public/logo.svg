<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <!-- Main gradient — IBM Bob blue to purple -->
    <linearGradient id="bobGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Inner glow for rocket -->
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer ring — animated glow border -->
  <circle
    cx="60" cy="60" r="56"
    stroke="url(#bobGrad)"
    stroke-width="1.5"
    stroke-dasharray="6 3"
    opacity="0.5"
    fill="none"
  />

  <!-- Background circle -->
  <circle cx="60" cy="60" r="50" fill="#161b22"/>

  <!-- Subtle grid lines inside circle -->
  <line x1="10" y1="60" x2="110" y2="60" stroke="#30363d" stroke-width="0.8"/>
  <line x1="60" y1="10" x2="60"  y2="110" stroke="#30363d" stroke-width="0.8"/>
  <line x1="25" y1="25" x2="95" y2="95" stroke="#30363d" stroke-width="0.5" opacity="0.5"/>
  <line x1="95" y1="25" x2="25" y2="95" stroke="#30363d" stroke-width="0.5" opacity="0.5"/>

  <!-- Orbit ring -->
  <ellipse
    cx="60" cy="60"
    rx="38" ry="14"
    stroke="url(#bobGrad)"
    stroke-width="1"
    fill="none"
    opacity="0.35"
    transform="rotate(-20 60 60)"
  />

  <!-- Rocket body -->
  <g filter="url(#innerGlow)" transform="translate(60,60) rotate(-45) translate(-60,-60)">
    <!-- Main rocket body -->
    <path
      d="M60 28 C52 36 48 50 48 62 L60 68 L72 62 C72 50 68 36 60 28Z"
      fill="url(#bobGrad)"
    />
    <!-- Rocket window -->
    <circle cx="60" cy="52" r="6" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5"/>
    <circle cx="60" cy="52" r="3" fill="#58a6ff" opacity="0.6"/>

    <!-- Left fin -->
    <path
      d="M48 62 C42 64 40 70 44 74 L48 70Z"
      fill="#bc8cff"
      opacity="0.9"
    />
    <!-- Right fin -->
    <path
      d="M72 62 C78 64 80 70 76 74 L72 70Z"
      fill="#bc8cff"
      opacity="0.9"
    />

    <!-- Exhaust flames — outer -->
    <path
      d="M52 70 C50 78 54 86 60 88 C66 86 70 78 68 70Z"
      fill="#f0883e"
      opacity="0.8"
    />
    <!-- Exhaust flames — inner -->
    <path
      d="M55 70 C54 76 57 82 60 83 C63 82 66 76 65 70Z"
      fill="#ffd700"
      opacity="0.9"
    />
  </g>

  <!-- Small orbit dots -->
  <circle cx="98" cy="52" r="3" fill="#58a6ff" opacity="0.7" filter="url(#glow)"/>
  <circle cx="22" cy="68" r="3" fill="#bc8cff" opacity="0.7" filter="url(#glow)"/>
  <circle cx="60" cy="108" r="2.5" fill="#3fb950" opacity="0.6" filter="url(#glow)"/>
  <circle cx="60" cy="12"  r="2" fill="#58a6ff" opacity="0.5"/>

  <!-- Corner star sparkles -->
  <g opacity="0.6">
    <path d="M20 22 L21.5 19 L23 22 L20 22Z" fill="#58a6ff"/>
    <path d="M21.5 17 L21.5 27" stroke="#58a6ff" stroke-width="0.8" opacity="0.4"/>

    <path d="M97 85 L98.5 82 L100 85 L97 85Z" fill="#bc8cff"/>
    <path d="M98.5 80 L98.5 90" stroke="#bc8cff" stroke-width="0.8" opacity="0.4"/>
  </g>
</svg>